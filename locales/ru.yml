openrouter_key_instruction: >
  Создать свой ключ интерфейса Openrouter можно, зарегистрировавшись на сайте
  openrouter.ai, нажав после входа на кружок аккаунта в правом левом углу
  и выбрав Keys (Ключи) из выпадающего меню. После загрузки страницы ключей
  нажмите кнопку "Create Api Key" (Создать Ключ Интерфейса). Теперь можно
  назвать новый ключ (например, "Инфорно") - это единственный обязательный
  параметр. Нажмите кнопку Create (Создать). По желанию, можно так же установить
  лимит на максимальную сумму, которую можно потратить используя этот ключ,
  которую можно по желаню сделать возобновляемой после периода времени. Так же
  по желанию можно установить срок годности самого ключа.

  Создайте ключ и скопируйте его в поле ниже:
