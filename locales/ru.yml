how_to_use: "Как пользоваться этой программой?"
welcome_tour: "
  Добро пожаловать в Инфорно! Ваш личный транспорт в Мир ИИ Моделей!\n\n
  Инфорно (Inforno) — это графический интерфейс (фронтенд) для Ollama и
  OpenRouter. Сама
  программа не запускает Большие Языковые Модели (LLM), а просто перенаправляет
  введённый пользователем запрос одному или нескольким Агентам, которые
  предоставляются одним или обоими бэкенд-решениями: Ollama и OpenRouter.
  \n\n
  Ollama — это фоновая служба, работающая на вашем компьютере, которая позволяет
  запускать LLM локально и бесплатно при условии, что модель доступна для
  скачивания и ваш компьютер обладает достаточным объемом памяти для её запуска.
  Список моделей, поддерживаемых Ollama, можно найти на странице
  ollama.com/search
  \n\n
  OpenRouter — это коммерческое облачное решение, которое перенаправляет запросы
  пользователей другим облачным провайдерам, предоставляя доступ к, в том числе,
  крупным коммерческим LLM, таким как Claude Opus, но без оформления
  ежемесячных или годовых подписок. Вы просто пополняете свой счёт в OpenRouter,
  и средства списываются за каждый использованный токен. Цены на разные модели
  сильно варьируются, но они указаны на сайте, так что вы можете сравнить их и
  выбрать подходящую модель (или модели) перед началом общения.
  \n\n
  Отказ от ответственности: мы, создатели Inforno, не связаны с Ollama или
  OpenRouter. Inforno лишь использует эти сервисы от вашего имени. Мы не
  собираем ваши персональные данные. Ваш ключ OpenRouter никогда не передается
  нам, он остается на используемом вами компьютере. Мы никогда не попросим
  у вас этот ключ. Если кто-то просит у вас API-ключ или деньги — это мошенники!
  Мы не взимаем плату, у нас нет подписок, личных кабинетов или серверов баз
  данных для хранения какой-либо вашей информации.
  \n\n
  Также имейте в виду, что и OpenRouter сам по себе тоже не запускает LLM, а
  передает ваши запросы сторонним поставщикам. Эти данные могут отслеживаться
  различными органами власти, хакерами или проходить через корпоративные среды
  с недостаточными мерами безопасности, где сотрудники могут иметь к ним доступ.
  В этом отношении вы действуете на свой страх и риск, поэтому будьте осторожны
  с содержанием ваших запросов при использовании OpenRouter. Если вы
  сомневаетесь, или если ваш запрос содержит личную или конфиденциальную
  информацию — для таких запросов используйте только Ollama. В любом случае
  Помните: LLM не являются источником истины. Проверяйте ответы и всегда
  полагайтесь на собственное суждение!
  \n\n
  Если вы откроете окно Пресеты и нажмёте кнопку Новый Пресет, вы
  увидите переключатель Select a Router: Ollama или OpenRouter. Если вы выберете
  Ollama, убедитесь, что служба Ollama запущена на вашем компьютере. Затем вы
  можете начать вводить текст в поле Select a Model, и автозаполнение подскажет
  модели, которые можно скачать через Ollama напрямую, нажав кнопку Скачать
  Модель. Ollama также поддерживает пользовательские модели в формате gguf.
  \n\n
  Чтобы начать использовать OpenRouter, вам не нужен мощный компьютер и не
  требуется скачивать модели. Всё, что нужно — это подключение к интернету и
  ключ API (API Key) от OpenRouter. Вы можете получить его бесплатно, просто
  зарегистрировавшись на сайте openrouter.ai и нажав кнопку Get API Key. Если
  кнопки нет на главной странице, нажмите на круглую кнопку Account в правом
  верхнем углу и выберите Key. В окне Api Keys будет список ваших ключей — по
  сути, это токены аутентификации, необходимые для использования сервиса
  OpenRouter из сторонних приложений. Вы также можете зайти на панель Chat на
  их сайте и попробовать их онлайн-интерфейс, который по функциональности похож
  на Inforno. Одно из преимуществ Inforno заключается в том, что история чата
  сохраняется в локальном файле \"Песочницы\", который можно сохранить как копию,
  открыть позже или поделиться им с другими пользователями Inforno.
  \n\n
  После создания API-ключа вы можете нажать кнопку API Keys и
  скопировать/вставить ключ в окно API Key Manager. У вас будет возможность
  сохранить его в системной связке ключей (System Keyring) или использовать его
  только до выхода из приложения (например, если вы работаете не за своим
  компьютером).
  \n\n
  Теперь вы можете вводить свои запросы на панели Чата, выбирать пресеты, куда
  отправлять запросы, и нажимать кнопку Send Prompt. Все ответы автоматически
  сохраняются в локальном файле. Меню Sandbox позволяет управлять файлом истории
  чата. Save As... означает, что файл будет перемещен из стандартной директории
  данных приложения (которая находится по адресу ~/.local/share/inforno/info.rno
  в Linux или C:/users/user/appdata/roaming/inforno/info.rno в Windows) в
  указанное вами место. В следующий раз его можно будет открыть в Inforno с
  помощью кнопки Open. Кнопка Save A Copy... позволяет сохранить текущую
  песочницу в отдельный файл, но продолжить работу в стандартной песочнице. Вы
  также можете полностью очистить песочницу по желанию.
  \n\n
  Редактор Промптов в нижней части экрана позволяет добавить системный промпт.
  Там есть небольшая кнопка 💻, при нажатии на которую открывается поле ввода
  специально для этой цели.
  "
